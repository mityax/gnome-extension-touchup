
from: base


env:
  OSK_REGION:                0%    67%   100%  33%    # contains the entire OSK in fully opened state
  KEY_Y_SURROUNDING_REGION:  43.9% 67.4% 10.6% 15%    # region around the "y" key, including key popup
  KEY_Y_POPUP_REGION:        47.6% 66.6% 4.9% 6.9%    # region containing only the key popup for "y"
  QUICK_PASTE_ACTION_REGION: 17.5% 66.8% 33.5% 6.7%   # left half of the OSK's suggestion area
  TEXT_EDITOR_INNER_REGION:  18.3% 23.4% 63.2% 41.7%  # the central area of the text editors text area, above the OSK
  
  QUICK_PASTE_ACTION_TEXT:   "I copied this!"


assets:
  osk_setup: |
    set -eou pipefail
    
    gsettings set org.gnome.desktop.a11y.applications screen-keyboard-enabled true
    gsettings set org.gnome.desktop.input-sources sources "[('xkb', 'us'), ('xkb', 'de')]"
    
    echo "Success"


defs:
  wait_for_editor:
    - wait:
        for: 
          dominant_color: white
        regions: $TEXT_EDITOR_INNER_REGION
  open_run_command_popup:
    - invoke_keys: ["alt", "f2"]
      sequential: false
    - wait:
        for:
          find:
            text: Run a Command
    - invoke_key: left  # a fix for the first character getting lost somehow in the command popup (most likely a Shell issue)
  copy_quick_paste_action_text:
    - open_run_command_popup:
    - type_text: $QUICK_PASTE_ACTION_TEXT
    - invoke_keys: ["ctrl", "a"]  # select all
      sequential: false
    - invoke_keys: ["ctrl", "c"]  # copy
      sequential: false
    - invoke_key: esc
    - wait:


steps:
  # === Preparation ===

  # Open a terminal as text input for OSK testing (since a normal text editor would 
  # have unpredictable OSK suggestions):
  - invoke_key: meta_l
  - wait:
      for: overview_ws1
  - type_text: terminal
  - invoke_key: ret
  - wait:
      for: terminal_opened

  # Enable the OSK (since we can't emulate touch mode properly):
  - type_text: "curl ${ASSETS_SERVER_ADDR}/osk_setup | sh"
  - invoke_key: ret
  - wait:
      for:
        find:
          text: Success
          location_hint: 30.8% 47.2%
  - type_text: clear
  - invoke_key: ret

  # Open osk (by tapping the terminal):
  - touch: center
  - wait:
      for: osk/osk_opened
      regions: $OSK_REGION


  # === Tests: OSK Gestures ===
  
  # Drag the OSK down a little to check mid-gesture appearance:
  - touch_press:   50% 75%
  - touch_move:    50% 76%
  - touch_move:    50% 77%
  - touch_move:    50% 78%
  - touch_move:    50% 79%
  - wait:
      for: osk/mid_gesture
      regions: $OSK_REGION

  # Complete the gesture and check if OSK is gone:
  - touch_release: 50% 80%
  - wait:
      for: terminal_opened

  # Tap the editor to reopen OSK:
  - touch: 50% 50%
  - wait:
      for: osk/osk_opened
      regions: $OSK_REGION

  - sleep: 2s

  # Drag the OSK down a little again, check mid-gesture appearance:
  - touch_press:   50% 75%
  - touch_move:    50% 76%
  - touch_move:    50% 77%
  - touch_move:    50% 78%
  - touch_move:    50% 79%
  - wait:
      for: osk/mid_gesture
      regions: $OSK_REGION

  # Cancel the gesture by moving up again, check if OSK is fully opened:
  - touch_move:    50% 78%
  - touch_move:    50% 77%
  - touch_release: 50% 76%
  - wait:
      for: osk/osk_opened
      regions: $OSK_REGION


  # === Tests: OSK Key Popups ===
  
  # Press a key, check that key popup appears, release the key, check if it disappears 
  # immediately:
  - touch_press:   50% 75%  # open the OSK Key popup for key "y"
  - wait:
      for: osk/osk_key_popup_y
      regions: 
        - $KEY_Y_POPUP_REGION
  - touch_release: 50% 75%
  - wait:
      for: osk/osk_opened
      regions:
        - $KEY_Y_POPUP_REGION
      timeout: 1s
  
  # Check that the key popup closes after some time even while still pressing the key:
  - touch_press:   50% 75%  # open the OSK Key popup for key "y"
  - wait:
      for: osk/osk_key_popup_y
      regions: 
        - $KEY_Y_POPUP_REGION
  - wait:
      for: osk/osk_opened
      regions: 
        - $KEY_Y_POPUP_REGION
  - touch_release: 50% 75%

  - sleep: 2s

  # Press a key, check that key popup appears, drag downwards, check if the popup disappears:
  - touch_press:   50% 75%  # open the OSK Key popup for key "y"
  - wait:
      for: osk/osk_key_popup_y
      regions: 
        - $KEY_Y_POPUP_REGION
  - touch_move:    50% 76%
  - touch_move:    50% 77%
  - touch_move:    50% 78%
  - touch_move:    50% 79%
  - wait:
      for: osk/mid_gesture
      regions:
        - 46.1% 71.4% 6.1% 7%  # surrounds the "y" key popup in OSK's mid-gesture state
      timeout: 1s
  - touch_move:    50% 79%
  - touch_move:    50% 78%
  - touch_move:    50% 77%
  - touch_move:    50% 76%
  - touch_release: 50% 75%

  - sleep: 2s

  # === Tests: OSK Extended Keys ===

  # Touch between the "t" and "y" key, check if popup appears:
  - touch_press: 47.95% 77%
  - wait:
      for: osk/osk_key_popup_y
      regions:
        - $KEY_Y_POPUP_REGION
  - touch_release: 47.95% 77%

  
  # === Overall Typing Result Check ===
  - wait:
      for: osk/typing_result_yyy
      regions: 37.9% 20.5% 8.1% 5.4%  # region around the "$ yyy" which should by now be written in the terminal
      timeout: 10s

  # === Tests: Quick Paste Action ===
  
  - copy_quick_paste_action_text:
      
  # Open the OSK, check that quick paste action appears:
  - touch: center
  - wait:
      for: osk/quick_paste_action
      regions: $QUICK_PASTE_ACTION_REGION
      diff: 0  # ensure the quick paste action looks exactly as it should

  # Invoke the quick paste action and check if text is properly pasted into the terminal:
  - touch:
      find:
        text: $QUICK_PASTE_ACTION_TEXT
  - wait:
      for:
        find:
          text: $QUICK_PASTE_ACTION_TEXT
      regions: 41.4% 20.1% 14.6% 6.3%  # the region in the terminal in which the pasted text should occur

  # Now try the same with a normal application (text editor) to also check CTRL+V (vs CTRL+SHIFT+V):
  - invoke_key: meta_l
  - wait:  # wait for overview
      for:
        find:
          text: Type to search
  - type_text: text editor
  - sleep: 300ms
  - invoke_key: ret
  - wait_for_editor:
  
  - copy_quick_paste_action_text:
  
  - touch: center
  - wait:
      for:
        find:
          text: $QUICK_PASTE_ACTION_TEXT
      regions: $QUICK_PASTE_ACTION_REGION
      timeout: 10s
  - touch: 
      find:
        text: $QUICK_PASTE_ACTION_TEXT
        location_hint: 33.7% 70.3%
  - wait:
      for: 
        find:
          text: $QUICK_PASTE_ACTION_TEXT
      regions: $TEXT_EDITOR_INNER_REGION
      timeout: 10s

  # Check that the quick paste button has disappeared after pasting:
  - wait:
      for: osk/osk_opened
      regions: $QUICK_PASTE_ACTION_REGION


  # === Tests: Space Bar IME Switching ===

  # Check that IME hint is present (OSK is still open):
  - assert:
      that:
        find:
          text: "English (US)"
          location_hint: bottom
          
  # Swipe to the right, check that hint and layout changes:
  - touch:
      - 42% 95%
      - 45% 95%
      - 48% 95%
      - 51% 95%
      - 55% 95%
  - wait:
      for:
        find:
          text: "German"
          location_hint: bottom
  - assert:  # check that the "y" key is now where "z" is in the english layout (they're swapped in German keyboards)
      that:
        find:
          text: "y"
      regions: 29.4% 87.2% 3.6% 5.6%  # region of the "z" key in the English (US) OSK layout

  # Swipe to the left again and check everything is back in its original state:
  - touch:
      - 55% 95%
      - 51% 95%
      - 48% 95%
      - 45% 95%
      - 42% 95%
  - wait:
      for:
        find:
          text: "English (US)"
          location_hint: bottom
  - assert:  # check that the "y" key is now again in its original position
      that:
        find:
          text: "y"
      regions: 47.1% 73.7% 3.9% 6.3%  # region of the "y" key in the English (US) OSK layout

  # Change indicator mode:
  - open_run_command_popup:
  - type_text: >-
      dconf write /org/gnome/shell/extensions/touchup/osk-space-bar-ime-switching-indicator-mode '"all"'
  - invoke_key: ret
  - wait:
      for:
        dominant_color: white
      regions: $TEXT_EDITOR_INNER_REGION
  - touch: center  # open the OSK again (it's closed on settings change)
  - wait:
      for: osk/space_bar_ime_switching_hint_mode_all
      regions: 44% 95% 10% 4%
      timeout: 10s
  


